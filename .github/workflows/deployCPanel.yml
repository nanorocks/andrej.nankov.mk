name: 🚀 Deploy website to cPanel

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          # Direct server IP — bypasses Cloudflare proxy which blocks FTP port 21.
          server: ${{ secrets.FTP_SERVER_IP }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          exclude: |
            **/.git*
            **/.git*/**

            # Claude Code config & memory
            .claude/**
            CLAUDE.md

            # Repo-level files not needed on server
            docker-compose.yml
            .docker/**
            .github/**
            README.md
            .commitsage

            # Laravel: secrets & local config
            website/.env
            website/.env.local
            website/.env.testing

            # Laravel: generated / installed locally
            website/vendor/**
            website/node_modules/**
            website/bootstrap/cache/*.php

            # Laravel: runtime storage — exclude content but allow .gitignore through
            # so the directory structure is created on the server
            website/storage/logs/**
            !website/storage/logs/.gitignore
            website/storage/debugbar/**
            !website/storage/debugbar/.gitignore
            website/storage/framework/cache/**
            !website/storage/framework/cache/.gitignore
            !website/storage/framework/cache/data/.gitignore
            website/storage/framework/sessions/**
            !website/storage/framework/sessions/.gitignore
            website/storage/framework/views/**
            !website/storage/framework/views/.gitignore
            website/storage/framework/testing/**
            !website/storage/framework/testing/.gitignore
            website/storage/app/public/**
            !website/storage/app/public/.gitignore
            website/storage/app/private/**
            !website/storage/app/private/.gitignore

            # Laravel: dev/test only
            website/tests/**
            website/phpunit.xml
            website/.editorconfig
            website/.vscode/**

            # Vite dev server leftover
            website/public/hot
