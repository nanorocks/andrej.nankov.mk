name: 🚀 Deploy website to cPanel

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🔄 Reset FTP sync state (ensures directory structure is re-verified)
        run: |
          curl -s \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -Q "DELE .ftp-deploy-sync-state.json" \
            "ftp://${{ secrets.FTP_SERVER_IP }}/" || true

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          # Direct server IP — bypasses Cloudflare proxy which blocks FTP port 21.
          server: ${{ secrets.FTP_SERVER_IP }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          exclude: |
            **/.git*
            **/.git*/**

            # Claude Code config & memory
            .claude/**
            CLAUDE.md

            # Repo-level files not needed on server
            deploy.sh
            docker-compose.yml
            .docker/**
            .github/**
            README.md
            .commitsage

            # Laravel: secrets & local config
            website/.env
            website/.env.local
            website/.env.testing

            # Laravel: generated / installed locally
            website/vendor/**
            website/node_modules/**
            website/bootstrap/cache/**

            # Laravel: runtime storage (never overwrite server logs/sessions)
            website/storage/logs/**
            website/storage/framework/cache/**
            website/storage/framework/sessions/**
            website/storage/framework/views/**

            # Laravel: dev/test only
            website/tests/**
            website/phpunit.xml
            website/.editorconfig
            website/.vscode/**

            # Vite dev server leftover
            website/public/hot
